version: '3.8'

services:
  tests-qa:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ENV: qa
    volumes:
      - ./api-automation-framework/target:/app/target
    networks:
      - test-network

  tests-uat:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ENV: uat
    volumes:
      - ./api-automation-framework/target:/app/target
    networks:
      - test-network

  # PostgreSQL for integration tests
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - test-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

networks:
  test-network:
    driver: bridge

volumes:
  postgres_data:
